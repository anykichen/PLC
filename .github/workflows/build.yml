name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      working-directory: PlcInjector
      run: dotnet restore PlcInjector.csproj

    - name: Build project
      working-directory: PlcInjector
      run: dotnet build PlcInjector.csproj -c Release

    - name: Publish as single file
      working-directory: PlcInjector
      run: |
        dotnet publish PlcInjector.csproj -c Release -r win-x64 --self-contained true `
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
          -o dist

    - name: Zip the output
      run: |
        Compress-Archive -Path PlcInjector\dist\* -DestinationPath PlcInjector-v${{ github.run_number }}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PlcInjector-win-x64
        path: PlcInjector-v${{ github.run_number }}.zip
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: PlcInjector-v${{ github.run_number }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
